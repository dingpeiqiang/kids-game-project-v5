<!DOCTYPE html>
<html>
<head>
  <title>游戏测试</title>
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
    #log { background: #222; padding: 10px; margin: 10px 0; max-height: 300px; overflow: auto; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>🐍 游戏调试测试</h1>
  <div id="log"></div>
  <button onclick="testGame()">测试游戏逻辑</button>
  <button onclick="testAudio()">测试音频</button>
  
  <script>
    const log = (msg, type = 'info') => {
      const div = document.createElement('div')
      div.className = type
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
      document.getElementById('log').appendChild(div)
    }

    const testGame = () => {
      log('=== 测试游戏逻辑 ===', 'info')
      
      // 测试蛇移动
      const snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }]
      const direction = { x: 1, y: 0 }
      
      log(`初始蛇头位置：(${snake[0].x}, ${snake[0].y})`, 'info')
      
      // 移动蛇
      const head = { ...snake[0] }
      head.x += direction.x
      head.y += direction.y
      
      log(`移动后蛇头位置：(${head.x}, ${head.y})`, 'success')
      log('✅ 蛇移动逻辑正常', 'success')
    }

    const testAudio = async () => {
      log('=== 测试音频 ===', 'info')
      
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)()
        log(`AudioContext 状态：${ctx.state}`, 'info')
        
        const osc = ctx.createOscillator()
        const gain = ctx.createGain()
        
        osc.type = 'square'
        osc.frequency.value = 440
        osc.connect(gain)
        gain.connect(ctx.destination)
        
        gain.gain.setValueAtTime(0.1, ctx.currentTime)
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3)
        
        osc.start()
        osc.stop(ctx.currentTime + 0.3)
        
        log('✅ 音频播放正常 (应该听到"滴"声)', 'success')
        
        await ctx.resume()
        log(`AudioContext 已恢复：${ctx.state}`, 'success')
      } catch (e) {
        log(`❌ 音频测试失败：${e.message}`, 'error')
      }
    }

    log('页面加载完成', 'success')
    log('点击按钮开始测试...', 'info')
  </script>
</body>
</html>
