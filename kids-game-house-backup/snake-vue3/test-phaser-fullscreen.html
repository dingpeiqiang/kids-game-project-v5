<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phaser 测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="info"></div>
  <div id="game-container"></div>

  <script type="module">
    import Phaser from 'phaser';

    const info = document.getElementById('info');

    function updateInfo(msg) {
      info.innerHTML += msg + '<br>';
      console.log(msg);
    }

    // 更新窗口信息
    updateInfo(`窗口尺寸: ${window.innerWidth} × ${window.innerHeight}`);
    updateInfo(`屏幕尺寸: ${window.screen.width} × ${window.screen.height}`);

    // Phaser 配置
    const config = {
      type: Phaser.AUTO,
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: window.innerWidth,
        height: window.innerHeight,
        min: { width: 320, height: 480 },
        max: { width: 2560, height: 1440 }
      },
      parent: 'game-container',
      backgroundColor: '#1a1a2e',
      scene: {
        preload() {
          updateInfo('preload 调用');
        },
        create() {
          updateInfo(`create 调用`);
          updateInfo(`gameSize: ${this.scale.gameSize.width} × ${this.scale.gameSize.height}`);
          updateInfo(`baseSize: ${this.scale.baseSize.width} × ${this.scale.baseSize.height}`);

          // 绘制背景
          const graphics = this.add.graphics();
          const colors = [0x1a1a2e, 0x16213e, 0x0f3460];
          for (let y = 0; y < this.scale.gameSize.height; y += 8) {
            const ratio = y / this.scale.gameSize.height;
            const color = Phaser.Display.Color.GetColor(
              Phaser.Display.Color.InterpolateColorWithColor(
                new Phaser.Display.Color(colors[0]),
                new Phaser.Display.Color(colors[2]),
                255,
                ratio
              ).color
            );
            graphics.fillStyle(color, 1);
            graphics.fillRect(0, y, this.scale.gameSize.width, 8);
          }

          // 绘制边框
          graphics.lineStyle(3, 0x4ade80, 0.5);
          graphics.strokeRect(0, 0, this.scale.gameSize.width, this.scale.gameSize.height);

          // 绘制测试文字
          this.add.text(
            this.scale.gameSize.width / 2,
            this.scale.gameSize.height / 2,
            '全屏测试\n' + `${this.scale.gameSize.width} × ${this.scale.gameSize.height}`,
            {
              fontSize: '32px',
              color: '#ffffff',
              align: 'center'
            }
          ).setOrigin(0.5);

          // 监听 resize
          this.scale.on('resize', (gameSize) => {
            updateInfo(`resize: ${gameSize.width} × ${gameSize.height}`);
          });
        },
        update() {
          // update 循环
        }
      }
    };

    const game = new Phaser.Game(config);
    updateInfo('Phaser 游戏已创建');
  </script>
</body>
</html>
