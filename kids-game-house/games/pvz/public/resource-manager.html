<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PVZ 资源管理器 - AI 增强版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --border: #0f3460;
      --gold: #FFD700;
      --green: #4CAF50;
      --red: #e74c3c;
      --blue: #2980b9;
      --text: #e0e0e0;
      --text-dim: #888;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== 顶部导航 ===== */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar .logo { font-size: 22px; }
    .topbar h1 { font-size: 18px; font-weight: 700; color: var(--gold); flex: 1; }
    .topbar .subtitle { font-size: 12px; color: var(--text-dim); }

    /* SD 连接状态 */
    .sd-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--border);
    }
    .sd-status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .sd-status.connected { background: #1a3a1a; }
    .sd-status.connected .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .sd-status.error { background: #3a1a1a; }
    .sd-status.error .dot { background: var(--red); }
    .sd-status.checking .dot { background: #f39c12; animation: blink 0.6s infinite; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary   { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #66BB6A; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #1a4a80; }
    .btn-danger    { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-info      { background: var(--blue); color: #fff; }
    .btn-info:hover { background: #3498db; }
    .btn-ai        { background: #9b59b6; color: #fff; }
    .btn-ai:hover  { background: #8e44ad; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== 布局 ===== */
    .layout { display: flex; height: calc(100vh - 57px); }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-section { margin-bottom: 8px; }
    .sidebar-title {
      padding: 6px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 700;
    }
    .sidebar-item {
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      color: #bbb;
    }
    .sidebar-item:hover { background: var(--border); color: #fff; }
    .sidebar-item.active { background: var(--border); border-left-color: var(--green); color: #fff; }
    .sidebar-item .badge {
      margin-left: auto;
      background: var(--green);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ===== 主内容区 ===== */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ===== 资源网格 ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 16px; font-weight: 700; color: var(--gold); }
    .section-header .count { font-size: 12px; color: var(--text-dim); }
    .section-header .actions { margin-left: auto; display: flex; gap: 8px; }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }

    .resource-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
    }
    .resource-card:hover {
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(76,175,80,0.2);
    }
    .resource-card .preview {
      width: 100%;
      aspect-ratio: 1;
      background: #0f1a30;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .resource-card .preview img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .resource-card .preview .no-preview {
      font-size: 32px;
      opacity: 0.3;
    }
    .resource-card .info {
      padding: 8px 10px;
    }
    .resource-card .name {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .resource-card .alias {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .resource-card .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .tag {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .tag-png  { background: #1a4a20; color: #66BB6A; }
    .tag-mp3  { background: #1a3050; color: #64b5f6; }
    .tag-json { background: #3a2a00; color: var(--gold); }
    .tag-new  { background: #9b59b6; color: #fff; }
    .tag-ai   { background: #6a0dad; color: #e1bee7; }

    /* 卡片 hover 操作按钮 */
    .resource-card .card-actions {
      position: absolute;
      top: 6px;
      right: 6px;
      display: none;
      gap: 4px;
    }
    .resource-card:hover .card-actions { display: flex; }
    .card-action-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      transition: background 0.15s;
    }
    .card-action-btn:hover { background: rgba(155,89,182,0.8); }

    /* ===== 音频列表 ===== */
    .audio-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .audio-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s;
    }
    .audio-item:hover { border-color: var(--blue); }
    .audio-icon { font-size: 28px; flex-shrink: 0; }
    .audio-info { flex: 1; min-width: 0; }
    .audio-info .name { font-size: 14px; font-weight: 600; }
    .audio-info .alias { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .audio-info .path { font-size: 11px; color: #555; font-family: monospace; margin-top: 4px; }
    .audio-player { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--blue);
      background: transparent;
      color: #64b5f6;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .play-btn:hover { background: var(--blue); color: #fff; }
    .play-btn.playing { border-color: var(--red); color: var(--red); }
    .play-btn.playing:hover { background: var(--red); color: #fff; }

    /* ===== 通用模态框 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 680px;
      max-width: 95vw;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; flex: 1; }
    .modal-close {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: none;
      background: var(--border);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: var(--red); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }


    /* ===== 图片编辑器布局 ===== */
    .ie-layout { display: flex; gap: 16px; }
    .ie-preview { flex: 1; min-width: 0; }
    .ie-preview-main {
      background: #0f1a30;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      max-height: 420px;
      overflow: hidden;
      position: relative;
    }
    .ie-preview-main img { object-fit: contain; }
    .ie-actions {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }
    .ie-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .ie-sidebar { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
    .ie-section { background: var(--card); border-radius: 8px; padding: 12px; }
    .ie-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .ie-info-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
    .ie-info-row .ie-label { color: var(--text-secondary); }
    .ie-info-row .ie-value { color: var(--text); }
    .ie-info-row code { font-size: 11px; background: #0f1a30; padding: 2px 6px; border-radius: 4px; }

    /* ===== AI 生成模态框 ===== */
    .gen-layout { display: flex; gap: 20px; }
    .gen-preview {
      flex: 0 0 45%;
      background: #0f1a30;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      min-height: 360px;
    }
    .gen-preview.clickable { cursor: crosshair; }
    .gen-preview .click-hint {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .gen-preview img {
      max-width: 100%;
      max-height: 320px;
      object-fit: contain;
      image-rendering: pixelated;
      display: block !important;
      visibility: visible !important;
    }
    .gen-preview .placeholder {
      font-size: 48px;
      opacity: 0.2;
      padding: 60px 20px;
      text-align: center;
    }
    .gen-preview .preview-badge {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 90%;
      text-align: center;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .gen-preview .preview-badge span {
      display: block;
    }
    /* 预览图浮动操作栏 */
    .gen-actions {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 180px;
      justify-content: flex-end;
    }
    .gen-actions .btn {
      padding: 6px 10px;
      font-size: 12px;
    }

    /* 参数说明 Tooltip */
    .param-tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-dim);
      font-size: 10px;
      cursor: help;
      margin-left: 4px;
      position: relative;
    }
    .param-tip:hover {
      background: var(--blue);
      color: #fff;
    }
    /* Tooltip 框 */
    #tooltip-box {
      position: fixed;
      background: #1a1a2e;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 380px;
      min-width: 200px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      z-index: 9999;
      pointer-events: none;
      display: none;
    }
    .gen-form { flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select {
      background: #0f1a30;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--blue);
    }
    .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .form-hint { font-size: 11px; color: var(--text-dim); }

    /* 风格选择器 */
    .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .style-option {
      padding: 7px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #0f1a30;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .style-option:hover { border-color: var(--blue); color: var(--text); }
    .style-option.selected { border-color: #9b59b6; background: rgba(155,89,182,0.15); color: #fff; }

    /* 生成进度条 */
    .gen-progress {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .gen-progress.show { display: flex; }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #9b59b6, #8e44ad);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 12px; color: var(--text-dim); text-align: center; }

    /* 完整性指示器 */
    .completeness-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .completeness-bar .score { font-size: 12px; font-weight: 700; }
    .completeness-bar .score.good { color: var(--green); }
    .completeness-bar .score.warn { color: #f39c12; }
    .completeness-bar .score.bad { color: var(--red); }
    .completeness-issues { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* ===== 详情表格 ===== */
    .detail-preview {
      text-align: center;
      background: #0f1a30;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .detail-preview img {
      max-width: 200px;
      max-height: 200px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table td { padding: 8px 6px; font-size: 13px; }
    .detail-table td:first-child { color: var(--text-dim); width: 100px; white-space: nowrap; }
    .detail-table td code {
      background: #0f1a30;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #64b5f6;
      word-break: break-all;
    }

    /* ===== 替换上传区域 ===== */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--green);
      background: rgba(76,175,80,0.05);
    }
    .upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-area p { font-size: 13px; color: var(--text-dim); }
    .upload-area strong { color: var(--green); }
    #fileInput { display: none; }

    /* ===== 统计栏 ===== */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 100px;
    }
    .stat-card .val { font-size: 24px; font-weight: 700; color: var(--gold); }
    .stat-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ===== 空状态 ===== */
    .empty { text-align: center; padding: 60px 20px; color: #555; }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    /* ===== Toast ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); }
    #toast.info  { background: var(--blue); }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== 图片编辑器 ===== */
    .ie-upper {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 12px;
    }
    .ie-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .ie-panel {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .ie-panel-title {
      background: rgba(255,255,255,0.03);
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .ie-panel-body {
      min-height: 200px;
      max-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      overflow: hidden;
    }
    .ie-panel-body img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
    }
    .ie-lower {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }
    .ie-info {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
    }
    .ie-info .ie-label {
      font-weight: 500;
      color: var(--text);
    }
    .ie-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ie-gen-form {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .ie-gen-form textarea {
      flex: 1;
      min-width: 200px;
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <span class="logo">🌻</span>
  <h1>PVZ 资源管理器</h1>
  <span class="subtitle">AI 增强版 · 植物大战僵尸</span>

<script>
// ==================== 图片操作编排器 ====================
/**
 * 统一的图片操作管理
 * 单一数据源，统一操作入口，清晰的状态流转
 */
const ImageEditor = (() => {
  // 私有状态
  let _currentKey = null;       // 当前资源 key
  let _originalBase64 = null;   // 原图 base64
  let _editedBase64 = null;     // 当前编辑结果（可能是原图、生成图、去背景图等）
  let _source = 'none';         // 数据来源：'original' | 'generated' | 'rembg'
  let _lastSeed = -1;

  // DOM 缓存
  const dom = {
    get ieBtnRmbg() { return document.getElementById('ieBtnRmbg'); },
    get ieBtnFlip() { return document.getElementById('ieBtnFlip'); },
    get ieBtnDl() { return document.getElementById('ieBtnDl'); },
    get ieBtnApply() { return document.getElementById('ieBtnApply'); },
  };

  // 统一更新预览 UI（更新右侧新图）
  function updatePreviewUI(base64, badgeText, source) {
    const newImg = document.getElementById('ieNewImage');
    const newPlaceholder = document.getElementById('ieNewPlaceholder');
    if (newImg) {
      newImg.src = base64.startsWith('data:') ? base64 : 'data:image/png;base64,' + base64;
      newImg.style.display = '';
      newImg.style.transform = '';
    }
    if (newPlaceholder) {
      newPlaceholder.style.display = 'none';
    }
    showBtns(true);
  }

  function showBtns(show) {
    const display = show ? '' : 'none';
    const disabled = !show;
    if (dom.ieBtnRmbg) { dom.ieBtnRmbg.style.display = display; }
    if (dom.ieBtnFlip) { dom.ieBtnFlip.style.display = display; }
    if (dom.ieBtnDl) { dom.ieBtnDl.style.display = display; }
    if (dom.ieBtnApply) { dom.ieBtnApply.disabled = disabled; }
  }

  // 初始化：加载原图
  async function loadOriginal(key, externalBase64) {
    _currentKey = key;
    _originalBase64 = null;
    _editedBase64 = null;
    _source = 'none';
    _lastSeed = -1;

    try {
      if (externalBase64) {
        // 外部传入 base64
        _originalBase64 = externalBase64;
      } else {
        // 内部加载
        const r = RESOURCES.images.find(x => x.key === key);
        if (!r || !r.path) throw new Error('资源不存在');
        _originalBase64 = await loadImageAsBase64(r.path);
      }
      _editedBase64 = _originalBase64;
      _source = 'original';
      updatePreviewUI(_editedBase64, '📷 原图', 'original');
    } catch (e) {
      console.error('加载原图失败:', e);
      if (dom.iePlaceholder) {
        dom.iePlaceholder.style.display = '';
        dom.iePlaceholder.innerHTML = '❌ 加载失败<br/><small style="font-size:11px;opacity:0.6">' + e.message + '</small>';
      }
      showBtns(false);
    }
  }

  // 设置生成的图片
  function setGenerated(base64, seed) {
    _editedBase64 = base64;
    _source = 'generated';
    _lastSeed = seed;
    updatePreviewUI(base64, `✨ AI生成 · seed: ${seed}`, 'generated');
  }

  // 设置编辑后的图片（替换、去背景等）
  function setEdited(base64, source) {
    _editedBase64 = base64;
    _source = source || 'edited';
    updatePreviewUI(base64, source === 'replaced' ? '📝 已替换' : '✏️ 已编辑', 'edited');
  }

  // 获取当前编辑结果的 base64
  function getCurrentBase64() {
    return _editedBase64;
  }

  // 获取带 data URL 前缀的
  function getCurrentDataUrl() {
    const b64 = _editedBase64;
    return b64.startsWith('data:') ? b64 : 'data:image/png;base64,' + b64;
  }

  // 去除背景
  async function removeBackground() {
    if (!_editedBase64) {
      showToast('请先加载图片', true);
      return null;
    }

    const btn = dom.ieBtnRmbg;
    const origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ 后处理...';

    try {
      const rawBase64 = _editedBase64.startsWith('data:') 
        ? _editedBase64.replace(/^data:image\/\w+;base64,/, '')
        : _editedBase64;

      const resp = await fetch('/rembg', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input_image: rawBase64.startsWith('data:') ? rawBase64 : 'data:image/png;base64,' + rawBase64,
          model: 'isnet-general-use',
          alpha_matting: true,
          alpha_matting_foreground_threshold: 240,
          alpha_matting_background_threshold: 10,
          alpha_matting_erode_size: 10
        }),
      });

      if (!resp.ok) {
        const err = await resp.text();
        throw new Error('rembg 失败: ' + err.substring(0, 100));
      }

      const data = await resp.json();
      if (!data.image) throw new Error('返回格式错误');

      _editedBase64 = data.image;
      _source = 'rembg';
      updatePreviewUI(_editedBase64, '🎯 去背景完成', 'rembg');
      showToast('✅ 背景已移除');
      return _editedBase64;
    } catch (e) {
      showToast('⚠️ 去背景失败: ' + e.message, true);
      return null;
    } finally {
      btn.disabled = false;
      btn.textContent = origText;
    }
  }

  // 水平镜像（Canvas 实际处理）
  async function flipHorizontal() {
    if (!_editedBase64) {
      showToast('请先加载图片', true);
      return;
    }

    const btn = document.getElementById('ieBtnFlip');
    if (btn) { btn.disabled = true; }

    try {
      const dataUrl = _editedBase64.startsWith('data:') ? _editedBase64 : 'data:image/png;base64,' + _editedBase64;
      const img = new Image();
      img.src = dataUrl;

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.translate(img.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(img, 0, 0);

      const flipped = canvas.toDataURL('image/png');
      const base64 = flipped.replace(/^data:image\/\w+;base64,/, '');
      _editedBase64 = base64;
      _source = 'flipped';

      const ieImg = document.getElementById('ieNewImage');
      ieImg.src = flipped;
      ieImg.style.transform = '';
      document.getElementById('ieNewPlaceholder').style.display = 'none';
      ieImg.style.display = '';

      showBtns(true);
      showToast('🔄 已水平镜像');
    } catch (e) {
      showToast('⚠️ 镜像失败: ' + e.message, true);
    } finally {
      if (btn) { btn.disabled = false; }
    }
  }

  // 下载
  function download() {
    if (!_editedBase64) return;
    const a = document.createElement('a');
    a.href = getCurrentDataUrl();
    a.download = `pvz_${_currentKey}_${_lastSeed}.png`;
    a.click();
    showToast('⬇️ 已下载');
  }

  // 应用到资源
  async function apply() {
    if (!_editedBase64 || !_currentKey) return;

    const res = RESOURCES.images.find(r => r.key === _currentKey);
    if (!res) {
      showToast('未找到资源', true);
      return;
    }

    const btn = dom.ieBtnApply || dom.genBtnApply;
    const origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ 缩放中...';

    try {
      let rawBase64 = _editedBase64.startsWith('data:')
        ? _editedBase64.replace(/^data:image\/\w+;base64,/, '')
        : _editedBase64;

      // 缩放到目标尺寸
      if (res.size) {
        rawBase64 = await resizeToFit(
          'data:image/png;base64,' + rawBase64,
          res.size.width,
          res.size.height
        );
      }

      // 保存到游戏目录
      let applied = false;
      try {
        const resp = await fetch('/__apply-resource', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ base64: rawBase64, resourcePath: res.path }),
        });
        if (resp.ok) applied = true;
      } catch (e) {
        console.warn('保存失败:', e);
      }

      // 备份到 generated
      await fetch('/__save-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ base64: rawBase64, filename: `pvz_${_currentKey}_${_lastSeed}.png` }),
      }).catch(() => {});

      // 更新状态
      res._aiGenerated = true;
      res._genSeed = _lastSeed;
      res._lastApplied = Date.now();

      showToast(applied 
        ? `✅ 已同步「${res.file}」${res.size ? `(${res.size.width}x${res.size.height})` : ''}`
        : `⚠️ 已备份，请手动替换`, false);

      renderContent(currentTab);
      closeImageEditor();
    } catch (e) {
      showToast('⚠️ 应用失败: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = origText;
    }
  }

  // 获取种子
  function getSeed() { return _lastSeed; }
  function setSeed(seed) { _lastSeed = seed; }
  function getSource() { return _source; }

  // 公开 API
  return {
    loadOriginal,
    setGenerated,
    setEdited,
    removeBackground,
    flipHorizontal,
    download,
    apply,
    getCurrentBase64,
    getCurrentDataUrl,
    getSeed,
    setSeed,
    getSource,
    get currentKey() { return _currentKey; },
  };
})();

// ==================== 配置 ====================
const API_BASE = ''; // 同源（server.ts 静态服务）

// Ollama 本地大模型配置
const OLLAMA_CONFIG = {
  enabled: true,
  baseUrl: 'http://localhost:11434',
  model: 'qwen2.5:14b-instruct-q4_K_M',
  translatePrompt: (cnPrompt) => `将以下中文提示词翻译成英文，用于 Stable Diffusion 图片生成。只返回英文提示词，不要解释。

中文: ${cnPrompt}

英文:`,
};

// 调用 Ollama 翻译中文提示词
async function translateWithOllama(cnPrompt) {
  if (!OLLAMA_CONFIG.enabled) {
    return cnPrompt; // 禁用时返回原文本
  }

  try {
    const resp = await fetch(`${OLLAMA_CONFIG.baseUrl}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_CONFIG.model,
        prompt: OLLAMA_CONFIG.translatePrompt(cnPrompt),
        stream: false,
        options: {
          temperature: 0.3, // 低温度保证翻译准确性
          num_predict: 500,
        }
      }),
    });

    if (!resp.ok) {
      throw new Error(`Ollama 响应失败: ${resp.status}`);
    }

    const data = await resp.json();
    const translated = data.response.trim();
    console.log('[Ollama] 翻译结果:', translated);
    return translated;
  } catch (e) {
    console.warn('[Ollama] 翻译失败，使用原文:', e.message);
    return cnPrompt; // 失败时返回原文
  }
}

// 转化按钮：中文 → 英文 Prompt
async function translateChineseToPrompt() {
  const cnInput = document.getElementById('genChinesePrompt');
  const enInput = document.getElementById('genPrompt');
  const cnText = cnInput.value.trim();
  
  if (!cnText) {
    showToast('请先输入中文提示词', true);
    return;
  }
  
  const btn = cnInput.parentElement.querySelector('button');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ 转化中...';
  
  try {
    const translated = await translateWithOllama(cnText);
    
    // 追加当前选中的风格后缀
    const styleSuffix = { cartoon: ', cartoon style, vibrant colors, game art',
                          'pixel-art': ', pixel art style, 8-bit game, vibrant colors',
                          chibi: ', chibi style, cute, kawaii, anime' }[selectedStyle] || '';
    
    enInput.value = translated + styleSuffix;
    btn.textContent = '✅ 完成';
    setTimeout(() => {
      btn.textContent = origText;
      btn.disabled = false;
    }, 1500);
  } catch (e) {
    btn.textContent = '❌ 失败';
    showToast('转化失败: ' + e.message, true);
    setTimeout(() => {
      btn.textContent = origText;
      btn.disabled = false;
    }, 2000);
  }
}

// ==================== SD 连接检测（指数退避重连）====================
function updateRetryStatus() {
  const el = document.getElementById('sdStatus');
  if (!el) return;
  if (sdConnected) {
    el.className = 'sd-status connected';
    el.querySelector('.label').textContent = '✅ SD WebUI 已连接';
  } else if (retryCountdown > 0) {
    el.className = 'sd-status error';
    el.querySelector('.label').textContent = `❌ 未连接，${retryCountdown}秒后重试...`;
  } else if (sdChecking) {
    el.className = 'sd-status checking';
    el.querySelector('.label').textContent = '⏳ 检测中...';
  } else {
    el.className = 'sd-status error';
    el.querySelector('.label').textContent = '❌ API 服务器未连接';
  }
  el.title = '点击立即重试 | 代理: /sdapi → 127.0.0.1:7860';
}

function scheduleRetry() {
  if (retryTimer) clearInterval(retryTimer);
  if (sdConnected) return;
  retryDelay = retryDelay === 0 ? 2 : Math.min(retryDelay * 2, 30);
  retryCountdown = retryDelay;
  updateRetryStatus();

  retryTimer = setInterval(() => {
    retryCountdown--;
    if (retryCountdown <= 0) {
      clearInterval(retryTimer);
      retryTimer = null;
      checkSD();
    } else {
      updateRetryStatus();
    }
  }, 1000);
}

function manualRetry() {
  if (sdChecking) return;
  if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
  retryDelay = 2;
  checkSD();
}

async function checkSD() {
  if (sdChecking) return;
  const el = document.getElementById('sdStatus');
  sdChecking = true;
  if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
  updateRetryStatus();

  try {
    const resp = await fetch('/sdapi/v1/sd-models', { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      sdConnected = true;
      retryDelay = 0;
      retryCountdown = 0;
    } else {
      throw new Error('status: ' + resp.status);
    }
  } catch {
    sdConnected = false;
    scheduleRetry();
  }
  sdChecking = false;
  updateRetryStatus();
}

  reader.onload = (e) => {
    const base64 = e.target.result;
    ImageEditor.setEdited(base64, 'replaced');
    const img = document.getElementById('ieNewImage');

      try { const e = await resp.json(); if (e.error) errMsg = e.error; } catch {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    const base64 = data.images && data.images[0];

    // 保存到历史

      hist.insertBefore(opt, hist.firstChild);

  } finally {
    btnGen.disabled = false;
  }
}

// ==================== Canvas 图片处理 ====================

// Canvas 缩放到目标尺寸（保持宽高比，居中显示，保留透明）
function resizeToFit(srcBase64, targetWidth, targetHeight) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d');
      
      // 清空画布（保留透明）
      ctx.clearRect(0, 0, targetWidth, targetHeight);
      
      // 计算缩放比例（保持宽高比，完整显示）
      const scale = Math.min(targetWidth / img.width, targetHeight / img.height);
      const scaledW = img.width * scale;
      const scaledH = img.height * scale;
      const dx = (targetWidth - scaledW) / 2;
      const dy = (targetHeight - scaledH) / 2;
      
      // 绘制缩放后的图片（保持透明）
      ctx.drawImage(img, dx, dy, scaledW, scaledH);
      
      const resizedBase64 = canvas.toDataURL('image/png').replace(/^data:image\/\w+;base64,/, '');
      resolve(resizedBase64);
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    // 兼容带/不带 data URL 前缀
    img.src = srcBase64.startsWith('data:') ? srcBase64 : 'data:image/png;base64,' + srcBase64;
  });
}

// ==================== 文件替换 ====================
function handleFileReplace(event) {
  const file = event.target.files[0];
  if (!file || !currentResource) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const url = e.target.result;
    if (currentResource.type === 'image') {
      const img = document.querySelector('#modal-body .detail-preview img');
      if (img) img.src = url;
    }
    showToast(`✅ 已预览替换：${file.name}（请手动覆盖文件以永久生效）`);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function handleDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');
  const file = event.dataTransfer.files[0];
  if (!file || !currentResource) return;
  const fakeEvent = { target: { files: [file], value: '' } };
  handleFileReplace(fakeEvent);
}

// ==================== 音频播放 ====================
function toggleAudio(key, path) {
  const btn = document.getElementById('play-' + key);

  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    document.querySelectorAll('.play-btn').forEach(b => {
      b.classList.remove('playing');
      b.textContent = '▶';
    });
    if (currentAudio._key === key) {
      currentAudio = null;
      return;
    }
  }

  const audio = new Audio(path);
  audio._key = key;
  currentAudio = audio;
  btn.classList.add('playing');
  btn.textContent = '■';
  audio.play().catch(() => showToast('音频播放失败', true));
  audio.onended = () => {
    btn.classList.remove('playing');
    btn.textContent = '▶';
    currentAudio = null;
  };
}

  if (seed === -1 || seed === null || seed === undefined) return;
  
  // 去重
  seedHistory = seedHistory.filter(s => s !== seed);
  // 插入到最前面
  seedHistory.unshift(seed);

  updateSeedHistoryDropdown();
}

// 将图片 URL 转为 base64
function loadImageAsBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/png').replace(/^data:image\/\w+;base64,/, ''));
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = url;
  });
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 3500);
}

// ==================== Tooltip 初始化 ====================
(function initTooltips() {
  const tooltipBox = document.getElementById('tooltip-box');
  const tips = document.querySelectorAll('.param-tip');

  tips.forEach(tip => {
    tip.addEventListener('mouseenter', (e) => {
      const text = tip.getAttribute('data-tip') || '';
      tooltipBox.textContent = text;
      tooltipBox.style.display = 'block';

      const rect = tip.getBoundingClientRect();
      const boxRect = tooltipBox.getBoundingClientRect();

      // 计算位置（居中于图标上方）
      let left = rect.left + rect.width / 2 - boxRect.width / 2;
      let top = rect.top - boxRect.height - 12;

      // 边界检测
      if (left < 10) left = 10;
      if (left + boxRect.width > window.innerWidth - 10) {
        left = window.innerWidth - boxRect.width - 10;
      }
      if (top < 10) top = rect.bottom + 12; // 下方放不下就放上方

      tooltipBox.style.left = left + 'px';
      tooltipBox.style.top = top + 'px';
    });

    tip.addEventListener('mouseleave', () => {
      tooltipBox.style.display = 'none';
    });
  });
})();
