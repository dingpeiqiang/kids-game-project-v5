<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>植物大战僵尸 - 全屏版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1a2e;
            /* 防止 iOS Safari 弹性滚动 */
            position: fixed;
            top: 0;
            left: 0;
            /* 安全区域适配 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 不使用 flex 居中，让 Phaser Scale Manager 自己处理 */
        }

        #game-container canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 全屏按钮 */
        #fullscreen-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        #fullscreen-btn:hover {
            background: rgba(76, 175, 80, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
        }
        
        /* 全屏时按钮 */
        :fullscreen #fullscreen-btn,
        :-webkit-full-screen #fullscreen-btn,
        :-moz-full-screen #fullscreen-btn {
            top: 16px;
            right: 16px;
            opacity: 0.7;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            #fullscreen-btn {
                font-size: 14px;
                padding: 8px 12px;
                top: calc(12px + env(safe-area-inset-top));
                right: calc(12px + env(safe-area-inset-right));
            }
        }

        /* 全屏时隐藏滚动条 */
        :fullscreen {
            overflow: hidden;
        }
        :fullscreen html, :fullscreen body {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏</button>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
        function toggleFullscreen() {
            const container = document.documentElement;
            const btn = document.getElementById('fullscreen-btn');
            
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.mozFullScreenElement && 
                !document.msFullscreenElement) {
                // 进入全屏
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(err => {
                        console.log('全屏请求失败:', err);
                    });
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.mozRequestFullScreen) {
                    container.mozRequestFullScreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
                btn.textContent = '✕ 退出';
            } else {
                // 退出全屏
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                btn.textContent = '⛶ 全屏';
            }
        }
        
        function handleFullscreenChange() {
            const btn = document.getElementById('fullscreen-btn');
            const isFullscreen = document.fullscreenElement || 
                                document.webkitFullscreenElement || 
                                document.mozFullScreenElement || 
                                document.msFullscreenElement;
            btn.textContent = isFullscreen ? '✕ 退出' : '⛶ 全屏';
            
            // 全屏变化后刷新 Phaser 缩放
            if (window.game && window.game.scale) {
                setTimeout(() => window.game.scale.refresh(), 100);
            }
        }
        
        // 监听全屏事件
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('mozfullscreenchange', handleFullscreenChange);
        document.addEventListener('MSFullscreenChange', handleFullscreenChange);
        
        // F11 快捷键拦截（可选，让浏览器原生全屏也能正确缩放）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                // 让浏览器处理 F11，然后延迟刷新
                setTimeout(() => {
                    if (window.game && window.game.scale) {
                        window.game.scale.refresh();
                    }
                    handleFullscreenChange();
                }, 200);
            }
        });
        
        // 双击切换全屏（移动端友好）
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            // 排除按钮区域的双击
            if (e.target.id === 'fullscreen-btn') return;
            
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                toggleFullscreen();
                e.preventDefault();
            }
            lastTap = currentTime;
        });
    </script>
</body>
</html>
