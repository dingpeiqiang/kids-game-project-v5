<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Phaser 测试</title>
    <style>
        body { margin: 0; padding: 0; }
        #game-container { width: 800px; height: 600px; margin: 50px auto; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script>
        // 简单的 Phaser 测试游戏
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#1a4d2e',
            scene: {
                preload: function() {
                    console.log('Phaser 版本:', Phaser.VERSION);
                    this.add.text(100, 100, 'Phaser 加载成功!', { 
                        fontSize: '32px', 
                        fill: '#ffffff' 
                    });
                },
                create: function() {
                    console.log('游戏创建成功');
                }
            }
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
