<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纹理映射测试</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      margin: 0;
    }
    
    h1 {
      text-align: center;
      color: #4ade80;
      margin-bottom: 10px;
    }
    
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
    }
    
    .mapping-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 800px;
      margin: 0 auto 30px;
    }
    
    .mapping-item {
      background: #2a2a2a;
      border: 2px solid #4a4a4a;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    
    .mapping-item img {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      background: #1a1a1a;
      margin: 10px 0;
    }
    
    .mapping-item .label {
      font-size: 12px;
      color: #fbbf24;
      margin-bottom: 5px;
    }
    
    .mapping-item .select {
      margin-top: 10px;
    }
    
    .mapping-item select {
      background: #3a3a3a;
      color: #fff;
      border: 1px solid #5a5a5a;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      width: 100%;
      cursor: pointer;
    }
    
    .summary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 8px;
      max-width: 800px;
      margin: 20px auto;
    }
    
    .summary h2 {
      color: #fff;
      margin-top: 0;
      font-size: 20px;
    }
    
    .summary table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    
    .summary th, .summary td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .summary th {
      background: rgba(0,0,0,0.2);
      font-weight: bold;
    }
    
    .btn {
      background: #4ade80;
      color: #1a1a1a;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      display: block;
      margin: 20px auto 0;
      transition: all 0.3s;
    }
    
    .btn:hover {
      background: #22c55e;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>🔍 纹理映射测试</h1>
  <div class="subtitle">选择每张图片的实际朝向，生成正确的映射关系</div>
  
  <div class="mapping-grid">
    <div class="mapping-item">
      <div class="label">enemy_light_up.png</div>
      <img src="/themes/tank_default/assets/scene/enemy_light_up.png">
      <div class="select">
        <select id="up-actual">
          <option value="">-- 选择实际朝向 --</option>
          <option value="up">⬆️ 向上</option>
          <option value="down">⬇️ 向下</option>
          <option value="left">⬅️ 向左</option>
          <option value="right">➡️ 向右</option>
        </select>
      </div>
    </div>
    
    <div class="mapping-item">
      <div class="label">enemy_light_down.png</div>
      <img src="/themes/tank_default/assets/scene/enemy_light_down.png">
      <div class="select">
        <select id="down-actual">
          <option value="">-- 选择实际朝向 --</option>
          <option value="up">⬆️ 向上</option>
          <option value="down">⬇️ 向下</option>
          <option value="left">⬅️ 向左</option>
          <option value="right">➡️ 向右</option>
        </select>
      </div>
    </div>
    
    <div class="mapping-item">
      <div class="label">enemy_light_left.png</div>
      <img src="/themes/tank_default/assets/scene/enemy_light_left.png">
      <div class="select">
        <select id="left-actual">
          <option value="">-- 选择实际朝向 --</option>
          <option value="up">⬆️ 向上</option>
          <option value="down">⬇️ 向下</option>
          <option value="left">⬅️ 向左</option>
          <option value="right">➡️ 向右</option>
        </select>
      </div>
    </div>
    
    <div class="mapping-item">
      <div class="label">enemy_light_right.png</div>
      <img src="/themes/tank_default/assets/scene/enemy_light_right.png">
      <div class="select">
        <select id="right-actual">
          <option value="">-- 选择实际朝向 --</option>
          <option value="up">⬆️ 向上</option>
          <option value="down">⬇️ 向下</option>
          <option value="left">⬅️ 向左</option>
          <option value="right">➡️ 向右</option>
        </select>
      </div>
    </div>
  </div>
  
  <div class="summary" id="summary">
    <h2>📋 代码映射关系</h2>
    <p style="color: #888; font-size: 14px;">请选择所有图片的实际朝向后查看结果</p>
  </div>
  
  <button class="btn" onclick="generateMapping()">🔄 生成映射代码</button>
  
  <script>
    const directionMap = {
      'up': '⬆️ 向上',
      'down': '⬇️ 向下',
      'left': '⬅️ 向左',
      'right': '➡️ 向右'
    };
    
    function generateMapping() {
      const upActual = document.getElementById('up-actual').value;
      const downActual = document.getElementById('down-actual').value;
      const leftActual = document.getElementById('left-actual').value;
      const rightActual = document.getElementById('right-actual').value;
      
      if (!upActual || !downActual || !leftActual || !rightActual) {
        alert('请先选择所有图片的实际朝向！');
        return;
      }
      
      // 构建反向映射：实际朝向 → 文件名
      const actualToFile = {
        'up': null,
        'down': null,
        'left': null,
        'right': null
      };
      
      actualToFile[upActual] = 'enemy_light_up';
      actualToFile[downActual] = 'enemy_light_down';
      actualToFile[leftActual] = 'enemy_light_left';
      actualToFile[rightActual] = 'enemy_light_right';
      
      // 生成代码
      const code = `
// 移动方向 → 纹理映射
if (vy < 0) {  // 向上移动
  enemy.setTexture('${actualToFile['up']}');
} else if (vy > 0) {  // 向下移动
  enemy.setTexture('${actualToFile['down']}');
} else if (vx < 0) {  // 向左移动
  enemy.setTexture('${actualToFile['left']}');
} else if (vx > 0) {  // 向右移动
  enemy.setTexture('${actualToFile['right']}');
}`;
      
      const summaryDiv = document.getElementById('summary');
      summaryDiv.innerHTML = `
        <h2>📋 映射关系</h2>
        <table>
          <tr>
            <th>移动方向</th>
            <th>使用纹理</th>
            <th>图片实际朝向</th>
          </tr>
          <tr>
            <td>⬆️ 向上 (vy < 0)</td>
            <td><code>${actualToFile['up']}</code></td>
            <td>${directionMap['up']}</td>
          </tr>
          <tr>
            <td>⬇️ 向下 (vy > 0)</td>
            <td><code>${actualToFile['down']}</code></td>
            <td>${directionMap['down']}</td>
          </tr>
          <tr>
            <td>⬅️ 向左 (vx < 0)</td>
            <td><code>${actualToFile['left']}</code></td>
            <td>${directionMap['left']}</td>
          </tr>
          <tr>
            <td>➡️ 向右 (vx > 0)</td>
            <td><code>${actualToFile['right']}</code></td>
            <td>${directionMap['right']}</td>
          </tr>
        </table>
        <pre style="background: #1a1a1a; padding: 15px; border-radius: 4px; overflow-x: auto; margin-top: 15px;"><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
      `;
    }
  </script>
</body>
</html>
