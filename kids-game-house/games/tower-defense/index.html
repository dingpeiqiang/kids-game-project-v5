<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    body {
      background-color: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      touch-action: none; /* 防止移动设备上的默认触摸行为 */
    }
    
    #game-container {
      position: relative;
      /* PC端优先使用较大尺寸 */
      width: min(90vw, 1200px);
      height: min(67.5vw, 900px); /* 保持4:3比例 */
      /* 最小和最大限制 */
      min-width: 400px;
      min-height: 300px;
      max-width: 100vw;
      max-height: 100vh;
    }
    
    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
