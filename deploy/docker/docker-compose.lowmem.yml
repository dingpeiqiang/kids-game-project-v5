services:
  # 数据库服务 - 低内存优化版
  mysql:
    image: mysql:8.0
    container_name: kids-game-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kidgame}
      MYSQL_USER: ${MYSQL_USER:-kidgame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kidgame123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kids-game-network
    # 限制 MySQL 内存使用
    mem_limit: 400m
    mem_reservation: 200m
    # MySQL 性能优化配置（低内存）
    command: >
      mysqld
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=48M
      --performance-schema=OFF
      --max-connections=50
      --table-open-cache=2000
      --thread-cache-size=8
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-kidgame}", "-p${MYSQL_PASSWORD:-kidgame123}"]
      timeout: 20s
      retries: 20
      interval: 10s
      start_period: 30s

  # Redis 缓存服务 - 低内存优化版
  redis:
    image: redis:7-alpine
    container_name: kids-game-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    # 限制 Redis 内存使用
    mem_limit: 100m
    mem_reservation: 50m
    command: >
      redis-server
      --maxmemory 80mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    networks:
      - kids-game-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 后端服务 - 低内存优化版
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend.lowmem
    container_name: kids-game-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kidgame?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-kidgame}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-kidgame123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      # JVM 低内存优化参数
      JAVA_OPTS: >
        -Xms128m
        -Xmx256m
        -XX:MetaspaceSize=64m
        -XX:MaxMetaspaceSize=128m
        -XX:+UseSerialGC
        -XX:-UseCompressedOops
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 限制后端内存使用
    mem_limit: 512m
    mem_reservation: 256m
    volumes:
      # 直接挂载到宿主机目录（方便查看完整日志）
      - ./logs:/app/logs
      - backend-uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - kids-game-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"   # 单个日志文件最大 50MB
        max-file: "10"    # 保留 10 个文件（总共最多 500MB）

  # 前端服务 - Nginx（轻量级）
  frontend:
    image: kids-game-frontend:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: kids-game-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "80:80"
    # 限制 Nginx 内存使用
    mem_limit: 64m
    mem_reservation: 32m
    depends_on:
      - backend
    networks:
      - kids-game-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # kids-game-simple 游戏服务 - 独立部署
  kids-game-simple:
    image: kids-game-simple-game:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.kids-game-simple
    container_name: kids-game-simple-game
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3001:80"
    # 限制内存使用
    mem_limit: 128m
    mem_reservation: 64m
    networks:
      - kids-game-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# 不启动游戏服务（内存不足）
# games:
#   profiles:
#     - games

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  backend-logs:
    driver: local
  backend-uploads:
    driver: local

networks:
  kids-game-network:
    driver: bridge
    name: kids-game-network
