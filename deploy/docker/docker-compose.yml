services:
  # 后端服务（低内存：.env 设 BACKEND_DOCKERFILE=deploy/docker/Dockerfile.backend.lowmem）
  backend:
    build:
      context: ../..
      dockerfile: ${BACKEND_DOCKERFILE:-deploy/docker/Dockerfile.backend}
    container_name: kids-game-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - backend-uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    networks:
      - kids-game-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # 前端服务
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: kids-game-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_UPLOAD_METHOD: ${VITE_UPLOAD_METHOD:-local}
    ports:
      - "3001:80"
    depends_on:
      - backend
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - kids-game-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 游戏服务（可选，使用 --profile games 启动）
  games:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.games
    container_name: kids-game-games
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "3004:3004"
    volumes:
      - game-data:/app/games
      - /etc/localtime:/etc/localtime:ro
    networks:
      - kids-game-network
    profiles:
      - games
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # kids-game-simple（HTTP 3000 避开通用 frontend:80；HTTPS 仅 443）
  kids-game-simple:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.kids-game-simple
    container_name: kids-game-simple
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - kids-game-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  backend-uploads:
    driver: local
  game-data:
    driver: local

networks:
  kids-game-network:
    driver: bridge
    name: kids-game-network