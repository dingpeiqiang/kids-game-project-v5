# kids-game-simple Nginx（容器内 443 → 宿主机映射 3443，见 docker-compose kids-game-simple ports）
# App / .env.production: https://kidsgame.dingpq.cn:3443/api
# 证书：deploy/docker/nginx/ssl/kidsgame.dingpq.cn_ca.crt 应为「站点 + 中间证书」fullchain

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name localhost kidsgame.dingpq.cn play.kidsgame.com;
    return 301 https://$host$request_uri;
}

# HTTPS（对外常为 :3443）
server {
    listen 443 ssl;
    http2 on;
    server_name localhost kidsgame.dingpq.cn play.kidsgame.com;

    ssl_certificate     /etc/nginx/ssl/kidsgame.dingpq.cn_ca.crt;
    ssl_certificate_key /etc/nginx/ssl/kidsgame.dingpq.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /games/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 与 compose 服务名 backend 同网段解析（container_name: kids-game-backend）
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}