# 宿主机 Nginx（监听 443）— Android / 浏览器推荐入口
# API: https://kidsgame.dingpq.cn/api  → 后端 8080（标准端口，避免手机对 :3443 握手 RST/-101）
# 静态 H5（可选）: / → kids-game-simple 容器 HTTP 3000 或 HTTPS 3443
#
# 用法（Linux 宿主机）:
#   cp deploy/docker/nginx/ssl/* /etc/nginx/ssl/
#   cp deploy/docker/nginx/kidsgame.dingpq.cn-gateway.conf /etc/nginx/conf.d/kidsgame.conf
#   nginx -t && systemctl reload nginx
# 需放行安全组 TCP 443；3443 仅作备用/管理，App 不再依赖。

upstream kids_game_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream kids_game_simple_http {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name kidsgame.dingpq.cn play.kidsgame.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name kidsgame.dingpq.cn play.kidsgame.com;

    ssl_certificate     /etc/nginx/ssl/kidsgame.dingpq.cn_ca.crt;
    ssl_certificate_key /etc/nginx/ssl/kidsgame.dingpq.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:KidsgameSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 50M;

    # App / .env.production: VITE_API_BASE=https://kidsgame.dingpq.cn/api
    location /api/ {
        proxy_pass http://kids_game_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://kids_game_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # kids-game-simple 静态（Docker 映射 3000:80）
    location / {
        proxy_pass http://kids_game_simple_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}