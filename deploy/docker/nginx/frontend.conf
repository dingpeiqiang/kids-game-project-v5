# 前端 Nginx 配置

# 自定义日志格式（避免与 nginx 默认 conf 冲突）
log_format custom_log '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                'rt=$request_time';

server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # 访问日志和错误日志
    access_log /var/log/nginx/access.log custom_log;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # === 缓存策略 ===
    
    # 1. 带哈希的资源文件（长期缓存）
    # 匹配: assets/main.a1b2c3d4.js, assets/style.e5f6g7h8.css
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # 文件名包含哈希，可以长期缓存
        if ($request_uri ~* "\.[a-f0-9]{8}\.") {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        } else {
            # 文件名不包含哈希，短期缓存
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
        }
        access_log off;
    }

    # 2. HTML 文件（不缓存或极短缓存）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 3. SPA 路由支持（index.html）
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 代理（用于实时通信）
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时（默认 60s 太小，需要延长）
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # 禁用缓冲，避免影响 WebSocket 性能
        proxy_buffering off;
    }

    # 游戏资源代理
    location /resources/ {
        proxy_pass http://backend:8080/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 游戏服务代理（暂时禁用，如需启用请添加 games 服务到 docker-compose）
    # location /games/ {
    #     proxy_pass http://games:3001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # WebSocket 支持（如果需要）
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
