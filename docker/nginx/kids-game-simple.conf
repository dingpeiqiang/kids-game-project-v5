# kids-game-simple Nginx 配置
# 使用相对路径 + 反向代理，前端无需知道后端地址

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name localhost kidsgame.dingpq.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name localhost kidsgame.dingpq.cn;

    ssl_certificate     /etc/nginx/ssl/kidsgame.dingpq.cn_ca.crt;
    ssl_certificate_key /etc/nginx/ssl/kidsgame.dingpq.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 访问日志和错误日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API 代理到后端（通过 Docker 网络）
    location /api/ {
        proxy_pass http://kids-game-backend:8080/api/;
        
        # 基本代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 注意：不要手动设置 Content-Type / Content-Length，让 Nginx 自动透传请求体
        
        # HTTP 版本和连接保持
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 禁用缓冲，确保请求体完整转发
        proxy_buffering off;
        proxy_request_buffering on;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA 路由支持（放在 /api 后面，避免被拦截）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 错误页面
    error_page 404 /index.html;
}
